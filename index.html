<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
    <title>Chronos · Desktop Timer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700&family=Jost:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #F0B429;
            --accent-deep: #C9871E;
            --accent-glow: rgba(240,180,41,.45);
            --glass-bg: rgba(18,18,26,.55);
            --glass-bg-soft: rgba(18,18,26,.38);
            --glass-border: rgba(255,255,255,.14);
            --text-primary: #F8F7F4;
            --text-secondary: rgba(248,247,244,.66);
            --text-tertiary: rgba(248,247,244,.42);
            --font-display: 'Jost', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --font-ui: 'Manrope', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --radius-lg: 28px;
            --radius-md: 16px;
            --radius-sm: 10px;
            --ease: cubic-bezier(.22,.9,.32,1);
        }
        * { box-sizing: border-box; margin: 0; }
        html, body { height: 100%; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: var(--font-ui);
            color: var(--text-primary);
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            background: #0b0b12;
            padding: 24px;
            padding-top: 40px;
        }
        .bg-layer { position: fixed; inset: 0; z-index: -2; transition: opacity 1.2s var(--ease); opacity: 0; }
        .bg-layer.active { opacity: 1; }
        .vignette {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(ellipse at 50% 20%, rgba(0,0,0,0) 0%, rgba(0,0,0,.45) 100%);
            pointer-events: none;
        }
        .flash-overlay {
            position: fixed; inset: 0; z-index: 50;
            background: #fff; opacity: 0; pointer-events: none;
        }
        .flash-overlay.flash-active { animation: flashPulse 1.2s ease-out; }
        @keyframes flashPulse {
            0% { opacity: 0; }
            10% { opacity: .6; }
            25% { opacity: .05; }
            40% { opacity: .5; }
            55% { opacity: .05; }
            70% { opacity: .3; }
            100% { opacity: 0; }
        }
        .app {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 1.2fr 0.9fr;
            gap: 24px;
            padding: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            box-shadow: 0 30px 60px -20px rgba(0,0,0,.7);
            margin: auto;  /* ← ADD THIS */
        }
        .app-left { display: flex; flex-direction: column; gap: 20px; }
        .app-right {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 20px;
            padding-top: 10px;
            padding-bottom: 10px;
        }
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 4px 8px;
            border-bottom: 1px solid var(--glass-border);
        }
        .brand { display: flex; align-items: center; gap: 10px; }
        .brand-mark {
            color: var(--accent);
            filter: drop-shadow(0 0 6px var(--accent-glow));
            transition: transform 0.4s var(--ease);
        }
        .brand-mark:hover { transform: rotate(15deg) scale(1.05); }
        .brand h1 { font-size: 1.4rem; margin: 0; letter-spacing: .04em; font-weight: 700; }
        .sessions-badge {
            display: flex;
            align-items: baseline;
            gap: 6px;
            background: var(--glass-bg-soft);
            border: 1px solid var(--glass-border);
            padding: 6px 14px;
            border-radius: 999px;
            backdrop-filter: blur(10px);
            transition: all 0.4s var(--ease);
        }
        .sessions-badge:hover {
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
            transform: translateY(-2px);
        }
        .sessions-count {
            font-family: var(--font-display);
            font-weight: 700;
            color: var(--accent);
            transition: transform 0.3s var(--ease);
        }
        .sessions-count.pop { animation: popNumber 0.4s var(--ease); }
        @keyframes popNumber {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); color: #fff; }
            100% { transform: scale(1); }
        }
        .sessions-label { font-size: .72rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .08em; }
        .timer-card {
            background: var(--glass-bg-soft);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            backdrop-filter: blur(12px);
            padding: 28px 24px 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 22px;
            transition: border-color 0.4s var(--ease), box-shadow 0.4s var(--ease);
        }
        .ring-wrap { position: relative; width: 100%; max-width: 280px; aspect-ratio: 1/1; }
        .progress-ring { width: 100%; height: 100%; transform: rotate(-90deg); }
        .ring-track { fill: none; stroke: rgba(255,255,255,.10); stroke-width: 10; }
        .ring-progress {
            fill: none;
            stroke: var(--accent);
            stroke-width: 10;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            filter: drop-shadow(0 0 6px var(--accent-glow));
        }
        .time-display {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #timeText {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: clamp(2.8rem, 5vw, 3.8rem);
            font-variant-numeric: tabular-nums;
            letter-spacing: .01em;
        }
        .quote-display {
            font-size: .72rem;
            font-style: italic;
            font-weight: 500;
            color: var(--text-secondary);
            text-align: center;
            line-height: 1.45;
            max-width: 80%;
            margin-top: 4px;
            min-height: 2.2rem;
            transition: opacity 0.5s var(--ease);
        }
        .presets { display: flex; gap: 8px; width: 100%; flex-wrap: wrap; justify-content: center; }
        .preset-btn {
            flex: 1 1 60px;
            font-family: var(--font-ui);
            font-weight: 600;
            font-size: .85rem;
            color: var(--text-primary);
            background: rgba(255,255,255,.05);
            border: 1px solid var(--glass-border);
            padding: 10px 6px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all .3s var(--ease);
            position: relative;
            overflow: hidden;
        }
        .preset-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(160deg, var(--accent), var(--accent-deep));
            opacity: 0;
            transition: opacity 0.4s var(--ease);
        }
        .preset-btn:hover { background: rgba(255,255,255,.1); transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,.3); }
        .preset-btn:active { transform: translateY(0) scale(.95); transition-duration: 0.05s; }
        .preset-btn.active {
            background: linear-gradient(160deg, var(--accent), var(--accent-deep));
            color: #221600;
            border-color: transparent;
            box-shadow: 0 6px 18px -6px var(--accent-glow);
            transform: translateY(-3px);
        }
        .preset-btn.active::after { opacity: 0; }
        .custom-time { display: flex; align-items: center; gap: 8px; width: 100%; flex-wrap: wrap; }
        .custom-time label { font-size: .72rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .08em; flex-shrink: 0; }
        .custom-time .input-group { display: flex; gap: 4px; flex: 1; min-width: 140px; }
        .custom-time input[type="number"] {
            flex: 1;
            min-width: 0;
            font-family: var(--font-display);
            color: var(--text-primary);
            background: rgba(255,255,255,.05);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            padding: 9px 8px;
            font-size: .9rem;
            width: 70px;
            transition: border-color 0.3s var(--ease), box-shadow 0.3s var(--ease);
        }
        .custom-time input[type="number"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
            outline: none;
        }
        .custom-time input[type="number"]::-webkit-outer-spin-button,
        .custom-time input[type="number"]::-webkit-inner-spin-button { opacity: .6; }
        .custom-time .unit-label { font-size: .7rem; color: var(--text-tertiary); padding: 0 4px; }
        .ghost-btn {
            font-family: var(--font-ui);
            font-weight: 600;
            font-size: .82rem;
            color: var(--text-primary);
            background: rgba(255,255,255,.06);
            border: 1px solid var(--glass-border);
            padding: 9px 16px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all .3s var(--ease);
            white-space: nowrap;
            position: relative;
            overflow: hidden;
        }
        .ghost-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,.08);
            opacity: 0;
            transition: opacity 0.4s var(--ease);
        }
        .ghost-btn:hover { background: rgba(255,255,255,.14); transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,.3); }
        .ghost-btn:active { transform: translateY(0) scale(.95); transition-duration: 0.05s; }
        .ghost-btn:hover::after { opacity: 1; }
        .controls { display: flex; gap: 10px; width: 100%; }
        .control-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: var(--font-ui);
            font-weight: 700;
            font-size: .9rem;
            color: var(--text-primary);
            background: rgba(255,255,255,.06);
            border: 1px solid var(--glass-border);
            padding: 13px 10px;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all .3s var(--ease);
            position: relative;
            overflow: hidden;
        }
        .control-btn .icon { width: 18px; height: 18px; flex-shrink: 0; transition: transform 0.3s var(--ease); }
        .control-btn:hover:not(:disabled) {
            background: rgba(255,255,255,.14);
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0,0,0,.3);
        }
        .control-btn:hover:not(:disabled) .icon { transform: scale(1.15); }
        .control-btn:active:not(:disabled) { transform: translateY(0) scale(.96); transition-duration: 0.05s; }
        .control-btn:disabled { opacity: .35; cursor: not-allowed; transform: none !important; }
        .control-btn.primary {
            background: linear-gradient(160deg, var(--accent), var(--accent-deep));
            color: #221600;
            border-color: transparent;
            box-shadow: 0 10px 24px -10px var(--accent-glow);
        }
        .control-btn.primary:hover:not(:disabled) {
            filter: brightness(1.08);
            box-shadow: 0 14px 36px -8px var(--accent-glow);
        }
        .control-btn.primary::after { background: rgba(255,255,255,.12); }
        .sound-card, .theme-card {
            background: var(--glass-bg-soft);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            backdrop-filter: blur(12px);
            padding: 22px 20px;
            transition: border-color 0.4s var(--ease), box-shadow 0.4s var(--ease);
        }
        h2 { margin: 0 0 14px; font-size: .78rem; text-transform: uppercase; letter-spacing: .12em; color: var(--text-secondary); font-weight: 600; }
        .sound-tabs { display: flex; gap: 8px; flex-wrap: wrap; }
        .sound-tab {
            font-family: var(--font-ui);
            font-weight: 600;
            font-size: .78rem;
            color: var(--text-secondary);
            background: rgba(255,255,255,.05);
            border: 1px solid var(--glass-border);
            padding: 8px 13px;
            border-radius: 999px;
            cursor: pointer;
            transition: all .3s var(--ease);
        }
        .sound-tab:hover {
            background: rgba(255,255,255,.1);
            color: var(--text-primary);
            transform: translateY(-3px);
            box-shadow: 0 4px 16px rgba(0,0,0,.2);
        }
        .sound-tab:active { transform: scale(.94); transition-duration: 0.05s; }
        .sound-tab.active {
            background: var(--accent);
            color: #221600;
            border-color: transparent;
            transform: translateY(-3px);
            box-shadow: 0 4px 16px var(--accent-glow);
        }
        .volume-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 16px;
            font-size: .78rem;
            color: var(--text-secondary);
            animation: fadeSlideDown 0.4s var(--ease);
        }
        @keyframes fadeSlideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .volume-row input[type="range"] { flex: 1; accent-color: var(--accent); cursor: pointer; }
        .volume-row.hidden { display: none; }
        .theme-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 10px;
        }
        .theme-swatch {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,.15);
            cursor: pointer;
            padding: 0;
            transition: all .4s var(--ease);
            position: relative;
        }
        .theme-swatch::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 2px solid transparent;
            transition: all 0.4s var(--ease);
        }
        .theme-swatch:hover { transform: scale(1.15); box-shadow: 0 6px 24px rgba(0,0,0,.4); }
        .theme-swatch:active { transform: scale(.88); transition-duration: 0.05s; }
        .theme-swatch.active {
            border-color: #fff;
            box-shadow: 0 0 0 3px rgba(255,255,255,.18), 0 6px 24px rgba(0,0,0,.4);
            transform: scale(1.08);
        }
        .theme-swatch.active::after { border-color: var(--accent); inset: -6px; }
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 60;
            background: rgba(8,8,12,.6);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            opacity: 0;
            pointer-events: none;
            transition: opacity .5s var(--ease);
        }
        .modal-overlay[hidden] { display: none; }
        .modal-overlay.visible { opacity: 1; pointer-events: auto; }
        .modal {
            width: 100%;
            max-width: 360px;
            background: rgba(24,22,20,.92);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 32px 26px;
            text-align: center;
            transform: translateY(30px) scale(.94);
            transition: transform .5s var(--ease), opacity .5s var(--ease);
            opacity: 0;
        }
        .modal-overlay.visible .modal { transform: translateY(0) scale(1); opacity: 1; }
        .modal-eyebrow { margin: 0 0 6px; font-size: .7rem; text-transform: uppercase; letter-spacing: .14em; color: var(--accent); }
        .modal h2 { margin: 0 0 8px; font-size: 1.5rem; color: var(--text-primary); text-transform: none; letter-spacing: 0; }
        .modal p#modalSubtitle { margin: 0 0 22px; font-size: .88rem; color: var(--text-secondary); }
        .modal-actions { display: flex; gap: 10px; }
        .modal-actions .control-btn { padding: 12px 10px; }
        .modal-actions .ghost-btn { flex: 1; }
        @media (max-width: 820px) {
            .app { grid-template-columns: 1fr; max-width: 560px; padding: 16px; }
            .app-right { padding-top: 0; padding-bottom: 0; }
            .theme-grid { grid-template-columns: repeat(6, 1fr); }
        }
        @media (max-width: 480px) {
            body { padding: 12px; }
            .app { padding: 12px; gap: 16px; }
            .timer-card { padding: 20px 16px; }
            .theme-grid { grid-template-columns: repeat(4, 1fr); }
            .controls { flex-wrap: wrap; }
            .control-btn { flex: 1 1 80px; }
        }
        :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }
        @media (max-width: 768px) {
            body {
                padding: 12px;
                align-items: flex-start;
                padding-top: 20px;
            }
            .app {
                grid-template-columns: 1fr;
                gap: 16px;
                padding: 16px;
                border-radius: 20px;
                max-width: 100%;
            }
            .app-right {
                padding-top: 0;
                padding-bottom: 0;
                gap: 16px;
            }
            .app-left {
                gap: 16px;
            }
            .timer-card {
                padding: 20px 16px 24px;
                gap: 16px;
            }
            .ring-wrap {
                max-width: 200px;
            }
            #timeText {
                font-size: clamp(2.2rem, 12vw, 2.8rem);
            }
            .preset-btn {
                flex: 1 1 45px;
                font-size: .75rem;
                padding: 8px 4px;
            }
            .custom-time {
                gap: 6px;
            }
            .custom-time input[type="number"] {
                padding: 7px 6px;
                font-size: .8rem;
                width: 50px;
            }
            .controls {
                flex-wrap: wrap;
                gap: 8px;
            }
            .control-btn {
                flex: 1 1 70px;
                padding: 10px 6px;
                font-size: .8rem;
            }
            .control-btn .icon {
                width: 16px;
                height: 16px;
            }
            .sound-tabs {
                gap: 6px;
            }
            .sound-tab {
                font-size: .7rem;
                padding: 6px 10px;
            }
            .theme-grid {
                grid-template-columns: repeat(6, 1fr);
                gap: 8px;
            }
            .quote-display {
                font-size: .65rem;
                max-width: 90%;
            }
            .sessions-badge {
                padding: 4px 10px;
            }
            .sessions-count {
                font-size: .9rem;
            }
            .sessions-label {
                font-size: .6rem;
            }
            .brand h1 {
                font-size: 1.1rem;
            }
            .brand-mark {
                width: 20px;
                height: 20px;
            }
            .modal {
                max-width: 300px;
                padding: 24px 20px;
            }
            .modal h2 {
                font-size: 1.2rem;
            }
            .modal-actions .control-btn {
                font-size: .8rem;
                padding: 10px 8px;
            }
            .volume-row {
                font-size: .7rem;
                gap: 8px;
            }
            .keyboard-shortcuts {
                font-size: .6rem;
                gap: 10px;
            }
            .keyboard-shortcuts kbd {
                font-size: .6rem;
                padding: 0px 5px;
            }
            .shortcut-label {
                font-size: .55rem;
            }
            .app-header {
                padding: 2px 2px 6px;
            }
        }
        @media (max-width: 480px) {
            body {
                padding: 8px;
                padding-top: 12px;
            }
            .app {
                padding: 12px;
                gap: 12px;
                border-radius: 16px;
            }
            .timer-card {
                padding: 16px 12px 20px;
                gap: 14px;
            }
            .ring-wrap {
                max-width: 160px;
            }
            #timeText {
                font-size: clamp(1.8rem, 10vw, 2.2rem);
            }
            .preset-btn {
                flex: 1 1 35px;
                font-size: .65rem;
                padding: 6px 3px;
            }
            .sound-tab {
                font-size: .6rem;
                padding: 4px 8px;
            }
            .theme-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 6px;
            }
            .controls {
                gap: 6px;
            }
            .control-btn {
                padding: 8px 4px;
                font-size: .7rem;
            }
            .control-btn .icon {
                width: 14px;
                height: 14px;
            }
            .custom-time input[type="number"] {
                padding: 5px 4px;
                font-size: .7rem;
                width: 40px;
            }
            .custom-time label {
                font-size: .6rem;
            }
            .custom-time .unit-label {
                font-size: .6rem;
            }
            .ghost-btn {
                font-size: .7rem;
                padding: 6px 10px;
            }
            .modal {
                max-width: 260px;
                padding: 20px 16px;
            }
            .modal h2 {
                font-size: 1rem;
            }
            .modal p#modalSubtitle {
                font-size: .75rem;
                margin-bottom: 16px;
            }
            .modal-actions .control-btn {
                font-size: .7rem;
                padding: 8px 6px;
            }
        }
        .control-btn:active:not(:disabled),
        .preset-btn:active,
        .sound-tab:active,
        .ghost-btn:active,
        .theme-swatch:active {
            transform: scale(0.94) !important;
            transition-duration: 0.05s;
        }
        button, .sound-tab, .theme-swatch {
            touch-action: manipulation;
        }
    </style>
</head>
<body>
<div class="bg-layer" id="bg1"></div>
<div class="bg-layer" id="bg2"></div>
<div class="vignette"></div>
<div class="flash-overlay" id="flashOverlay"></div>
<main class="app" id="app">
    <div class="app-left">
        <header class="app-header">
            <div class="brand">
                <svg class="brand-mark" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#F0B429" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M6 2h12"/><path d="M6 22h12"/>
                    <path d="M6 2c0 5 12 5 12 10s-12 5-12 10"/>
                    <path d="M18 2c0 5-12 5-12 10s12 5 12 10"/>
                </svg>
                <h1>Chronos</h1>
            </div>
            <div class="sessions-badge" title="Sessions completed this visit">
                <span class="sessions-count" id="sessionsCount">0</span>
                <span class="sessions-label">sessions</span>
            </div>
        </header>
        <section class="timer-card">
            <div class="ring-wrap">
                <svg class="progress-ring" viewBox="-15 -15 250 250">
                    <circle class="ring-track" cx="110" cy="110" r="96"/>
                    <circle class="ring-progress" id="ringProgress" cx="110" cy="110" r="96"/>
                </svg>
                <div class="time-display">
                    <span id="timeText">30:00</span>
                </div>
            </div>
            <div class="quote-display" id="quoteOfDay">"Small steps, every day, win the race."</div>
            <div class="presets" role="group" aria-label="Preset durations">
                <button class="preset-btn" data-minutes="15">15m</button>
                <button class="preset-btn active" data-minutes="30">30m</button>
                <button class="preset-btn" data-minutes="60">60m</button>
            </div>
            <div class="custom-time">
                <label for="customMinutes">Custom</label>
                <div class="input-group">
                    <input type="number" id="customMinutes" min="0" max="180" placeholder="0" inputmode="numeric" value="0">
                    <span class="unit-label">min</span>
                    <input type="number" id="customSeconds" min="0" max="59" placeholder="0" inputmode="numeric" value="0">
                    <span class="unit-label">sec</span>
                </div>
                <button class="ghost-btn" id="setCustomBtn">Set</button>
            </div>
            <div class="controls">
                <button class="control-btn primary" id="startBtn" aria-label="Start timer">
                    <svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                    <span>Start</span>
                </button>
                <button class="control-btn" id="pauseBtn" aria-label="Pause timer" disabled>
                    <svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
                    <span>Pause</span>
                </button>
                <button class="control-btn" id="resetBtn" aria-label="Reset timer">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/></svg>
                    <span>Reset</span>
                </button>
            </div>
        </section>
    </div>
    <div class="app-right">
        <section class="sound-card">
            <h2>Atmosphere</h2>
            <div class="sound-tabs" role="group" aria-label="Ambient sound">
                <button class="sound-tab active" data-sound="none">None</button>
                <button class="sound-tab" data-sound="rain">Rainfall</button>
                <button class="sound-tab" data-sound="ocean">Waves</button>
                <button class="sound-tab" data-sound="airplane">Airplane</button>
                <button class="sound-tab" data-sound="birds">Birds</button>
                <button class="sound-tab" data-sound="campfire">Campfire</button>
                <button class="sound-tab" data-sound="coffee">Coffee Shop</button>
            </div>
            <div class="volume-row hidden" id="volumeRow">
                <span>Volume</span>
                <input type="range" id="volumeSlider" min="0" max="100" value="50">
            </div>
        </section>
        <section class="theme-card">
            <h2>Theme</h2>
            <div class="theme-grid" id="themeGrid"></div>
        </section>
    </div>
</main>
<div class="modal-overlay" id="modalOverlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div id="modalCompleteView">
            <p class="modal-eyebrow">Session complete</p>
            <h2 id="modalTitle">Time's Up!</h2>
            <p id="modalSubtitle">Nice focus. Keep the momentum going?</p>
            <div class="modal-actions">
                <button class="control-btn primary" id="modalReturnBtn" style="flex:1;">Return to Timer</button>
            </div>
        </div>
        <div id="modalPickerView" hidden>
            <p class="modal-eyebrow">Next session</p>
            <h2>How long?</h2>
            <div class="presets" role="group" aria-label="Preset durations for next session">
                <button class="preset-btn" data-minutes="15">15m</button>
                <button class="preset-btn" data-minutes="30">30m</button>
                <button class="preset-btn" data-minutes="60">60m</button>
            </div>
            <div class="custom-time">
                <label for="modalCustomMinutes">Custom</label>
                <div class="input-group">
                    <input type="number" id="modalCustomMinutes" min="0" max="180" placeholder="0" inputmode="numeric" value="0">
                    <span class="unit-label">min</span>
                    <input type="number" id="modalCustomSeconds" min="0" max="59" placeholder="0" inputmode="numeric" value="0">
                    <span class="unit-label">sec</span>
                </div>
                <button class="ghost-btn" id="modalSetCustomBtn">Go</button>
            </div>
            <button class="ghost-btn" id="modalBackBtn" style="width:100%;margin-top:12px;">Back</button>
        </div>
    </div>
</div>
<script>
    const state = {
        totalSeconds: 30 * 60,
        remainingSeconds: 30 * 60,
        isRunning: false,
        timerId: null,
        endTimestamp: null,
        sessionsCompleted: 0,
        currentSound: 'none',
        volume: 0.5,
        audioCtx: null,
        ambientNodes: null,
    };
    const RING_RADIUS = 96;
    const RING_CIRCUMFERENCE = 2 * Math.PI * RING_RADIUS;
    const QUOTES = [
        "Small steps, every day, win the race.",
        "Focus is a muscle — you're training it right now.",
        "The work you do today is tomorrow's momentum.",
        "Discipline is choosing what you want most over what you want now.",
        "One focused hour beats a distracted day.",
        "Progress, not perfection.",
        "Deep work is a superpower in a shallow world.",
        "You don't have to see the whole staircase, just take the step.",
        "Consistency turns effort into mastery.",
        "Start where you are. Use what you have. Do what you can.",
        "The secret of getting ahead is getting started.",
        "Every session compounds — trust the process.",
        "Clarity comes from action, not thought.",
        "A calm mind gets more done than a rushed one.",
        "Show up. That's most of the battle.",
        "Your future self is built in moments like this one.",
        "Slow is smooth, and smooth is fast.",
        "Great things take time — give it yours.",
        "The best time to focus was yesterday. The next best time is now.",
        "Done is better than perfect.",
    ];
    const THEMES = {
        ocean: { label: 'Ocean', gradient: 'linear-gradient(160deg, #003049, #669BBC)' },
        forest: { label: 'Forest', gradient: 'linear-gradient(160deg, #0B3D0B, #6BBF59)' },
        sunset: { label: 'Sunset', gradient: 'linear-gradient(160deg, #F97316, #EC4899)' },
        midnight: { label: 'Midnight', gradient: 'linear-gradient(160deg, #1A0033, #000000)' },
        lavender: { label: 'Lavender', gradient: 'linear-gradient(160deg, #4C1D95, #C4B5FD)' },
        rose: { label: 'Rose', gradient: 'linear-gradient(160deg, #881337, #FDA4AF)' },
        autumn: { label: 'Autumn', gradient: 'linear-gradient(160deg, #7C2D12, #FBBF24)' },
        arctic: { label: 'Arctic', gradient: 'linear-gradient(160deg, #0C4A6E, #E0F2FE)' },
        volcano: { label: 'Volcano', gradient: 'linear-gradient(160deg, #450A0A, #F97316)' },
        mint: { label: 'Mint', gradient: 'linear-gradient(160deg, #064E3B, #6EE7B7)' },
        berry: { label: 'Berry', gradient: 'linear-gradient(160deg, #3B0764, #F472B6)' },
        golden: { label: 'Golden Hour', gradient: 'linear-gradient(160deg, #78350F, #FDE68A)' },
        cosmic: { label: 'Cosmic', gradient: 'linear-gradient(160deg, #0F172A, #6366F1)' },
        coral: { label: 'Coral Reef', gradient: 'linear-gradient(160deg, #164E63, #FB7185)' },
        desert: { label: 'Desert', gradient: 'linear-gradient(160deg, #B45309, #FEF3C7)' },
        aurora: { label: 'Aurora', gradient: 'linear-gradient(160deg, #022C22, #22D3EE)' },
    };
    const el = {
        timeText: document.getElementById('timeText'),
        quoteOfDay: document.getElementById('quoteOfDay'),
        ringProgress: document.getElementById('ringProgress'),
        sessionsCount: document.getElementById('sessionsCount'),
        presetBtns: document.querySelectorAll('.timer-card .preset-btn'),
        customMinutes: document.getElementById('customMinutes'),
        customSeconds: document.getElementById('customSeconds'),
        setCustomBtn: document.getElementById('setCustomBtn'),
        startBtn: document.getElementById('startBtn'),
        pauseBtn: document.getElementById('pauseBtn'),
        resetBtn: document.getElementById('resetBtn'),
        soundTabs: document.querySelectorAll('.sound-tab'),
        volumeRow: document.getElementById('volumeRow'),
        volumeSlider: document.getElementById('volumeSlider'),
        themeGrid: document.getElementById('themeGrid'),
        bg1: document.getElementById('bg1'),
        bg2: document.getElementById('bg2'),
        flashOverlay: document.getElementById('flashOverlay'),
        modalOverlay: document.getElementById('modalOverlay'),
        modalCompleteView: document.getElementById('modalCompleteView'),
        modalPickerView: document.getElementById('modalPickerView'),
        modalReturnBtn: document.getElementById('modalReturnBtn'),
        modalPresetBtns: document.querySelectorAll('#modalPickerView .preset-btn'),
        modalCustomMinutes: document.getElementById('modalCustomMinutes'),
        modalCustomSeconds: document.getElementById('modalCustomSeconds'),
        modalSetCustomBtn: document.getElementById('modalSetCustomBtn'),
        modalBackBtn: document.getElementById('modalBackBtn'),
        app: document.getElementById('app'),
        body: document.body,
    };
    function formatTime(sec) {
        const m = Math.floor(sec / 60).toString().padStart(2, '0');
        const s = Math.floor(sec % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
    }
    function updateDisplay() {
        el.timeText.textContent = formatTime(state.remainingSeconds);
        document.title = state.isRunning ? `${formatTime(state.remainingSeconds)} · Chronos` : 'Chronos · Timer';
    }
    function updateRing() {
        const ratio = state.totalSeconds > 0 ? state.remainingSeconds / state.totalSeconds : 0;
        const circumference = RING_CIRCUMFERENCE;
        const offset = circumference * (1 - ratio);
        el.ringProgress.style.strokeDasharray = circumference;
        el.ringProgress.style.strokeDashoffset = offset;
    }
    function updateSessionsUI() {
        el.sessionsCount.textContent = state.sessionsCompleted;
        el.sessionsCount.classList.remove('pop');
        void el.sessionsCount.offsetWidth;
        el.sessionsCount.classList.add('pop');
    }
    function showQuoteOfTheDay() {
        const dayOfYear = Math.floor((Date.now() - new Date(new Date().getFullYear(), 0, 0)) / 86400000);
        el.quoteOfDay.textContent = QUOTES[dayOfYear % QUOTES.length];
    }
    function updateControlsUI() {
        el.startBtn.disabled = state.isRunning;
        el.pauseBtn.disabled = !state.isRunning;
    }
    function getCustomSeconds() {
        const mins = parseInt(el.customMinutes.value, 10) || 0;
        const secs = parseInt(el.customSeconds.value, 10) || 0;
        return mins * 60 + Math.min(secs, 59);
    }
    function setDuration(seconds) {
        state.totalSeconds = seconds;
        state.remainingSeconds = seconds;
        stopTicking();
        stopAmbient(true);
        state.isRunning = false;
        updateControlsUI();
        updateDisplay();
        updateRing();
        hideModal();
    }
    function startTimer() {
        if (state.isRunning) return;
        if (state.remainingSeconds <= 0) state.remainingSeconds = state.totalSeconds;
        state.isRunning = true;
        state.endTimestamp = Date.now() + state.remainingSeconds * 1000;
        getAudioCtx();
        if (state.currentSound !== 'none') startAmbient(state.currentSound);
        state.timerId = setInterval(tick, 50);
        updateControlsUI();
    }
    function tick() {
        const secsLeft = Math.max(0, Math.round((state.endTimestamp - Date.now()) / 1000));
        if (secsLeft === state.remainingSeconds) return;
        state.remainingSeconds = secsLeft;
        updateDisplay();
        updateRing();
        if (secsLeft <= 0) completeTimer();
    }
    function pauseTimer() {
        if (!state.isRunning) return;
        stopTicking();
        state.isRunning = false;
        stopAmbient(false);
        updateControlsUI();
    }
    function resetTimer() {
        stopTicking();
        state.isRunning = false;
        stopAmbient(true);
        state.remainingSeconds = state.totalSeconds;
        updateDisplay();
        updateRing();
        updateControlsUI();
        hideModal();
    }
    function stopTicking() {
        if (state.timerId) { clearInterval(state.timerId);
            state.timerId = null; }
    }
    function completeTimer() {
        stopTicking();
        state.isRunning = false;
        stopAmbient(false);
        setTimeout(playEndingChime, 300);
        state.sessionsCompleted++;
        updateSessionsUI();
        state.remainingSeconds = state.totalSeconds;
        updateDisplay();
        updateRing();
        updateControlsUI();
        triggerFlash();
        showModal();
    }
    function setDurationFromCustom() {
        const total = getCustomSeconds();
        if (total < 1) {
            el.customMinutes.value = 0;
            el.customSeconds.value = 0;
            el.customMinutes.focus();
            return;
        }
        el.presetBtns.forEach(b => b.classList.remove('active'));
        setDuration(total);
    }
    function getAudioCtx() {
        if (!state.audioCtx) {
            const AC = window.AudioContext || window.webkitAudioContext;
            state.audioCtx = new AC();
        }
        if (state.audioCtx.state === 'suspended') state.audioCtx.resume();
        return state.audioCtx;
    }
    function startAmbient(type) {
        stopAmbient(true);
        const ctx = getAudioCtx();
        const masterGain = ctx.createGain();
        masterGain.gain.value = 0;
        masterGain.connect(ctx.destination);
        const volumeScale = 0.12;
        masterGain.gain.linearRampToValueAtTime(state.volume * volumeScale, ctx.currentTime + 1.2);
        const sources = [];
        let intervalId = null;
        function createAudioWithVolume(src) {
            const audio = new Audio(src);
            audio.loop = true;
            const source = ctx.createMediaElementSource(audio);
            source.connect(masterGain);
            audio._source = source;
            return audio;
        }
        if (type === 'rain') {
            const audio = createAudioWithVolume('my-rainfall.mp3');
            audio.play();
            sources.push(audio);
        } else if (type === 'airplane') {
            const audio = createAudioWithVolume('my-airplane.mp3');
            audio.play();
            sources.push(audio);
        } else if (type === 'ocean') {
            const audio = createAudioWithVolume('my-waves.mp3');
            audio.play();
            sources.push(audio);
        } else if (type === 'birds') {
            const audio = createAudioWithVolume('my-birds.mp3');
            audio.play();
            sources.push(audio);
        } else if (type === 'campfire') {
            const audio = createAudioWithVolume('my-fireplace.mp3');
            audio.play();
            sources.push(audio);
        } else if (type === 'coffee') {
            const audio = createAudioWithVolume('my-coffeeshop.mp3');
            audio.play();
            sources.push(audio);
        }
        state.ambientNodes = { masterGain, sources, intervalId };
    }
    function stopAmbient(fast) {
        if (!state.ambientNodes || !state.audioCtx) return;
        const { masterGain, sources, intervalId } = state.ambientNodes;
        const ctx = state.audioCtx;
        const now = ctx.currentTime;
        const rampTime = fast ? 0.08 : 1.2;
        masterGain.gain.cancelScheduledValues(now);
        masterGain.gain.setValueAtTime(masterGain.gain.value, now);
        masterGain.gain.linearRampToValueAtTime(0.0001, now + rampTime);
        if (intervalId) {
            if (typeof intervalId === 'number') clearInterval(intervalId);
            else if (typeof intervalId === 'object') clearTimeout(intervalId);
        }
        setTimeout(() => {
            sources.forEach(s => {
                try {
                    if (s._source) {
                        s._source.disconnect();
                    }
                    s.pause();
                    s.currentTime = 0;
                } catch (e) {}
            });
        }, rampTime * 1000 + 60);
        state.ambientNodes = null;
    }
    function playEndingChime() {
        const ctx = getAudioCtx();
        const now = ctx.currentTime;
        const volumeScale = 0.12;
        const vol = state.volume * volumeScale * 0.8;
        const notes = [523.25, 659.25, 783.99, 1046.5];
        notes.forEach((freq, i) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.value = freq;
            const start = now + i * 0.18;
            gain.gain.setValueAtTime(0, start);
            gain.gain.linearRampToValueAtTime(vol * 0.5, start + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.6);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(start);
            osc.stop(start + 0.65);
        });
        const pad = ctx.createOscillator();
        const padGain = ctx.createGain();
        pad.type = 'sine';
        pad.frequency.value = 261.63;
        padGain.gain.setValueAtTime(0, now);
        padGain.gain.linearRampToValueAtTime(vol * 0.12, now + 0.2);
        padGain.gain.exponentialRampToValueAtTime(0.0001, now + 1.2);
        pad.connect(padGain);
        padGain.connect(ctx.destination);
        pad.start(now);
        pad.stop(now + 1.3);
    }
    let activeBgLayer = 1;
    function setTheme(key) {
        const theme = THEMES[key];
        if (!theme) return;
        const incoming = activeBgLayer === 1 ? el.bg2 : el.bg1;
        const outgoing = activeBgLayer === 1 ? el.bg1 : el.bg2;
        incoming.style.background = theme.gradient;
        incoming.classList.add('active');
        outgoing.classList.remove('active');
        activeBgLayer = activeBgLayer === 1 ? 2 : 1;
        document.body.dataset.theme = key;
        document.querySelectorAll('.theme-swatch').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.theme === key);
        });
    }
    function buildThemeGrid() {
        Object.entries(THEMES).forEach(([key, theme]) => {
            const btn = document.createElement('button');
            btn.className = 'theme-swatch' + (key === 'ocean' ? ' active' : '');
            btn.style.background = theme.gradient;
            btn.title = theme.label;
            btn.dataset.theme = key;
            btn.setAttribute('aria-label', `Theme: ${theme.label}`);
            btn.addEventListener('click', () => setTheme(key));
            el.themeGrid.appendChild(btn);
        });
    }
    function showModal() {
        el.modalCompleteView.hidden = false;
        el.modalPickerView.hidden = true;
        el.modalOverlay.hidden = false;
        requestAnimationFrame(() => el.modalOverlay.classList.add('visible'));
    }
    function hideModal() {
        el.modalOverlay.classList.remove('visible');
        setTimeout(() => { el.modalOverlay.hidden = true; }, 300);
    }
    function triggerFlash() {
        el.flashOverlay.classList.remove('flash-active');
        void el.flashOverlay.offsetWidth;
        el.flashOverlay.classList.add('flash-active');
        setTimeout(() => el.flashOverlay.classList.remove('flash-active'), 1300);
    }
    function setupEventListeners() {
        el.presetBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                el.presetBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                el.customMinutes.value = 0;
                el.customSeconds.value = 0;
                setDuration(Number(btn.dataset.minutes) * 60);
            });
        });
        el.setCustomBtn.addEventListener('click', setDurationFromCustom);
        el.customMinutes.addEventListener('keydown', (e) => { if (e.key === 'Enter') setDurationFromCustom(); });
        el.customSeconds.addEventListener('keydown', (e) => { if (e.key === 'Enter') setDurationFromCustom(); });
        el.startBtn.addEventListener('click', startTimer);
        el.pauseBtn.addEventListener('click', pauseTimer);
        el.resetBtn.addEventListener('click', resetTimer);
        el.soundTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                el.soundTabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                state.currentSound = tab.dataset.sound;
                el.volumeRow.classList.toggle('hidden', state.currentSound === 'none');
                if (state.isRunning && state.currentSound !== 'none') {
                    startAmbient(state.currentSound);
                } else if (state.currentSound === 'none') {
                    stopAmbient(true);
                }
            });
        });
        el.volumeSlider.addEventListener('input', () => {
            state.volume = Number(el.volumeSlider.value) / 100;
            if (state.ambientNodes && state.audioCtx) {
                const volumeScale = 0.12;
                state.ambientNodes.masterGain.gain.setTargetAtTime(state.volume * volumeScale, state.audioCtx.currentTime, 0.05);
            }
        });
        el.modalReturnBtn.addEventListener('click', hideModal);
        el.modalBackBtn.addEventListener('click', () => {
            el.modalPickerView.hidden = true;
            el.modalCompleteView.hidden = false;
        });
        el.modalPresetBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const minutes = Number(btn.dataset.minutes);
                el.presetBtns.forEach(b => b.classList.toggle('active', Number(b.dataset.minutes) === minutes));
                el.customMinutes.value = 0;
                el.customSeconds.value = 0;
                setDuration(minutes * 60);
                startTimer();
            });
        });
        el.modalSetCustomBtn.addEventListener('click', () => {
            const mins = parseInt(el.modalCustomMinutes.value, 10) || 0;
            const secs = parseInt(el.modalCustomSeconds.value, 10) || 0;
            const total = mins * 60 + Math.min(secs, 59);
            if (total < 1) { el.modalCustomMinutes.focus(); return; }
            el.presetBtns.forEach(b => b.classList.remove('active'));
            setDuration(total);
            startTimer();
        });
        el.modalCustomMinutes.addEventListener('keydown', (e) => { if (e.key === 'Enter') el.modalSetCustomBtn.click(); });
        el.modalCustomSeconds.addEventListener('keydown', (e) => { if (e.key === 'Enter') el.modalSetCustomBtn.click(); });
        el.modalOverlay.addEventListener('click', (e) => { if (e.target === el.modalOverlay) hideModal(); });
    }
    function setupKeyboardShortcuts() {
        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.code === 'Space') {
                e.preventDefault();
                if (state.isRunning) {
                    pauseTimer();
                } else {
                    startTimer();
                }
            }
            if (e.key === 'r' || e.key === 'R') {
                resetTimer();
            }
            if (e.key === 'Escape') {
                if (!el.modalOverlay.hidden && el.modalOverlay.classList.contains('visible')) {
                    hideModal();
                }
            }
        });
    }
    function init() {
        buildThemeGrid();
        setTheme('ocean');
        showQuoteOfTheDay();
        updateDisplay();
        updateRing();
        updateControlsUI();
        updateSessionsUI();
        setupEventListeners();
        setupKeyboardShortcuts();
        el.soundTabs.forEach(tab => {
            if (tab.dataset.sound === 'none') {
                tab.classList.add('active');
            } else {
                tab.classList.remove('active');
            }
        });
        el.app.classList.add('visible');
        document.body.classList.add('loaded');
    }
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
</script>
</body>
